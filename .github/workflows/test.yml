name: test

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # README 承诺在 3.8 与 3.12 上跑离线回归自检；最低支持 3.7（install.sh 校验）
        python-version: ["3.8", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install PyYAML (cross-check only, not a runtime dependency)
        run: pip install pyyaml
      - name: Run offline regression smoke test
        run: python3 test_smoke.py
